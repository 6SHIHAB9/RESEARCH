<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Observatory — Emergent Civilization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Calm observatory palette — slate, muted teal, warm off-white */
    --bg-0: #0f1318;          
    --bg-1: #141a21;          
    --bg-2: #1b232c;          
    --line: rgba(255,255,255,0.06);
    --line-strong: rgba(255,255,255,0.10);

    --ink:        #e8ebef;
    --ink-soft:   #aab3bd;
    --ink-mute:   #6b7682;
    --ink-faint:  #424c57;

    --teal:   #6fb3a8;   
    --sky:    #7aa5c9;   
    --amber:  #c9a06b;   
    --rose:   #c9667a;   
    --lilac:  #9b8cc4;   

    --radius: 10px;
    --radius-sm: 6px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400;
    font-feature-settings: "ss01","cv11";
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    letter-spacing: 0.005em;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(1200px 800px at 70% 20%, rgba(111,179,168,0.05), transparent 60%),
      radial-gradient(900px 700px at 15% 90%, rgba(122,165,201,0.04), transparent 60%),
      radial-gradient(1400px 1000px at 50% 50%, rgba(255,255,255,0.015), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

  /* ───── Header ───── */
  header {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    position: relative;
    z-index: 10;
  }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, rgba(255,255,255,0.55), transparent 45%),
      radial-gradient(circle at center, var(--teal) 0%, #2a4a48 70%, #0e1518 100%);
    box-shadow: 0 0 0 1px rgba(111,179,168,0.25), 0 0 24px rgba(111,179,168,0.18);
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(111,179,168,0.15);
    animation: orbit 8s linear infinite;
  }
  @keyframes orbit { to { transform: rotate(360deg); } }

  .brand-title { font-family: 'Instrument Serif', serif; font-size: 1.35rem; letter-spacing: 0.02em; color: var(--ink); font-weight: 400; }
  .brand-sub { font-size: 0.7rem; color: var(--ink-mute); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; margin-top: 2px; }

  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.72rem; color: var(--ink-soft); letter-spacing: 0.18em; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,0.015);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
    box-shadow: 0 0 0 3px rgba(111,179,168,0.18);
    animation: breathe 2.6s ease-in-out infinite;
  }
  .status.offline .status-dot { background: var(--rose); box-shadow: 0 0 0 3px rgba(201,102,122,0.18); animation: none; }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  .metrics { display: flex; align-items: stretch; gap: 0; }
  .metric { display: flex; flex-direction: column; align-items: flex-end; padding: 0 22px; border-left: 1px solid var(--line); }
  .metric:first-child { border-left: none; }
  .metric-label { font-size: 0.62rem; color: var(--ink-mute); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }
  .metric-value { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; color: var(--ink); font-weight: 400; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .metric-value.accent { color: var(--teal); }
  .metric-value.warn   { color: var(--rose); }
  .header-right { display: flex; align-items: center; gap: 20px; }

  /* ───── Main grid ───── */
  main {
    display: grid;
    grid-template-columns: 340px 1fr 340px;
    height: calc(100vh - 64px);
    position: relative;
    z-index: 5;
  }

  .panel { background: linear-gradient(180deg, var(--bg-1), #11161c); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .panel.left  { border-right: 1px solid var(--line); }
  .panel.right { border-left:  1px solid var(--line); }

  .panel-head { padding: 18px 22px 14px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--line); }
  .panel-title { font-family: 'Instrument Serif', serif; font-size: 1.05rem; color: var(--ink); letter-spacing: 0.01em; }
  .panel-sub { font-size: 0.62rem; color: var(--ink-mute); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }

  /* ───── Event feed ───── */
  #feed-container {
    flex: 1; overflow-y: auto; padding: 14px 14px 80px; display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth; mask-image: linear-gradient(180deg, transparent 0, #000 18px, #000 calc(100% - 60px), transparent 100%);
  }

  .event-card {
    position: relative; padding: 12px 14px 12px 18px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.018); border: 1px solid var(--line);
    opacity: 0; transform: translateY(-6px); animation: fadeSlide 480ms var(--ease) forwards;
    transition: background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .event-card:hover { background: rgba(255,255,255,0.035); border-color: var(--line-strong); }
  .event-card::before { content: ""; position: absolute; left: 0; top: 10px; bottom: 10px; width: 2px; background: var(--ink-faint); border-radius: 2px; }

  .ev-meta {
    display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
    color: var(--ink-mute); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px;
  }
  .ev-tag { padding: 2px 7px; border-radius: 999px; background: rgba(255,255,255,0.04); color: var(--ink-soft); letter-spacing: 0.16em; }
  .ev-body { font-size: 0.92rem; line-height: 1.5; color: var(--ink); font-weight: 400; }
  .ev-agent { color: var(--ink); font-weight: 600; }
  .ev-quote { display: block; margin-top: 8px; font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: var(--ink-soft); font-style: italic; border-left: 2px solid var(--line-strong); padding-left: 12px; }

  .event-conflict::before { background: var(--rose); } .event-conflict .ev-tag { color: var(--rose); background: rgba(201,102,122,0.10); }
  .event-trade::before { background: var(--amber); }   .event-trade .ev-tag { color: var(--amber); background: rgba(201,160,107,0.10); }
  .event-memory::before { background: var(--sky); }    .event-memory .ev-tag { color: var(--sky); background: rgba(122,165,201,0.10); }
  .event-speech::before { background: var(--lilac); }  .event-speech .ev-tag { color: var(--lilac); background: rgba(155,140,196,0.10); }
  .event-move::before { background: var(--ink-faint); }

  @keyframes fadeSlide { to { opacity: 1; transform: translateY(0); } }

  /* ───── World map ───── */
  #map-wrapper { position: relative; overflow: hidden; background: radial-gradient(900px 700px at 50% 50%, #182029 0%, #0d1216 60%, #090d11 100%); }

  .lattice { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 28px 28px; background-position: 0 0; mask-image: radial-gradient(ellipse at center, #000 40%, transparent 85%); pointer-events: none; }
  .horizon-rings { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 0 240px, rgba(255,255,255,0.025) 240px 241px, transparent 242px 380px, rgba(255,255,255,0.018) 380px 381px, transparent 382px); mask-image: radial-gradient(ellipse at center, #000 60%, transparent 95%); animation: ringFloat 18s ease-in-out infinite alternate; }
  @keyframes ringFloat { from { opacity: 0.6; transform: scale(1); } to { opacity: 1; transform: scale(1.04); } }

  .motes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .mote { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(255,255,255,0.35); animation: drift linear infinite; opacity: 0; }
  @keyframes drift { 0% { opacity: 0; transform: translate(0,0); } 10% { opacity: 0.5; } 90% { opacity: 0.4; } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)); } }

  #world-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; }

  .hud { position: absolute; left: 22px; top: 18px; display: flex; gap: 10px; z-index: 10; pointer-events: none; }
  .hud-chip { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--ink-soft); letter-spacing: 0.16em; text-transform: uppercase; padding: 6px 10px; background: rgba(15,19,24,0.6); backdrop-filter: blur(8px); border: 1px solid var(--line); border-radius: 999px; }
  .hud-chip .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--teal); margin-right: 7px; vertical-align: middle; }
  .hud-coords { position: absolute; right: 22px; bottom: 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--ink-mute); letter-spacing: 0.14em; text-align: right; z-index: 10; pointer-events: none; line-height: 1.7; }

  .legend { position: absolute; left: 22px; bottom: 18px; display: flex; gap: 14px; z-index: 10; pointer-events: none; padding: 8px 14px; background: rgba(15,19,24,0.55); backdrop-filter: blur(8px); border: 1px solid var(--line); border-radius: 999px; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--ink-soft); letter-spacing: 0.12em; text-transform: uppercase; }
  .legend-swatch { width: 7px; height: 7px; border-radius: 50%; }

  /* ───── Roster ───── */
  #roster-container { flex: 1; overflow-y: auto; padding: 14px 14px 80px; display: flex; flex-direction: column; gap: 10px; mask-image: linear-gradient(180deg, transparent 0, #000 18px, #000 calc(100% - 60px), transparent 100%); }

  .entity-card { position: relative; padding: 14px 14px 12px; border-radius: var(--radius); background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.012)); border: 1px solid var(--line); transition: all 240ms var(--ease); cursor: default; overflow: hidden; }
  .entity-card:hover { border-color: rgba(111,179,168,0.35); background: linear-gradient(180deg, rgba(111,179,168,0.06), rgba(255,255,255,0.012)); transform: translateY(-1px); }

  .ent-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ent-id { display: flex; align-items: center; gap: 10px; }
  .ent-glyph { width: 22px; height: 22px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6), transparent 50%), var(--teal); box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 14px rgba(111,179,168,0.22); flex-shrink: 0; }
  .ent-name { font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: var(--ink); letter-spacing: 0.01em; }
  
  .ent-status-badge {
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px; font-weight: 500;
    color: var(--ink-soft); background: rgba(255,255,255,0.04); border: 1px solid var(--line);
  }
  .status-positive { color: var(--teal); background: rgba(111,179,168,0.10); border-color: rgba(111,179,168,0.20); }
  .status-negative { color: var(--rose); background: rgba(201,102,122,0.10); border-color: rgba(201,102,122,0.20); }
  .status-social   { color: var(--lilac); background: rgba(155,140,196,0.10); border-color: rgba(155,140,196,0.20); }

  .ent-action { font-size: 0.86rem; color: var(--ink-soft); line-height: 1.45; margin: 4px 0 12px; display: flex; align-items: baseline; gap: 6px; }
  .ent-action .lead { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--ink-mute); letter-spacing: 0.16em; text-transform: uppercase; flex-shrink: 0;}

  .ent-stats { display: flex; flex-direction: column; gap: 8px; }
  .stat-row { display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--ink-mute); letter-spacing: 0.14em; text-transform: uppercase; }
  .stat-row .label { width: 28px; }
  .stat-row .val { width: 32px; text-align: right; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--teal); border-radius: 999px; transition: width 600ms var(--ease); }
  .fill-sus { background: var(--sky); }

  .entity-card.active-pulse { animation: cardPulse 1400ms var(--ease); }
  @keyframes cardPulse { 0% { box-shadow: 0 0 0 0 rgba(111,179,168,0.25); } 100% { box-shadow: 0 0 0 14px rgba(111,179,168,0); } }

  .empty { color: var(--ink-mute); text-align: center; padding: 40px 20px; font-size: 0.85rem; font-style: italic; font-family: 'Instrument Serif', serif; }

  @media (max-width: 1100px) { main { grid-template-columns: 280px 1fr 280px; } .metric { padding: 0 14px; } }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-title">Observatory</div>
        <div class="brand-sub">Emergent Civilization · Live</div>
      </div>
    </div>

    <div class="header-right">
      <div class="metrics">
        <div class="metric"><span class="metric-label">Cycle</span><span class="metric-value" id="val-tick">00000</span></div>
        <div class="metric"><span class="metric-label">Entities</span><span class="metric-value accent" id="val-agents">0</span></div>
        <div class="metric"><span class="metric-label">Conflicts</span><span class="metric-value warn" id="val-conflicts">0</span></div>
      </div>
      <div class="status" id="conn-status"><span class="status-dot"></span><span id="conn-label">Connecting</span></div>
    </div>
  </header>

  <main>
    <aside class="panel left">
      <div class="panel-head"><div class="panel-title">Chronicle</div><div class="panel-sub">Live feed</div></div>
      <div id="feed-container"><div class="empty">Awaiting first transmissions…</div></div>
    </aside>

    <section id="map-wrapper">
      <div class="lattice"></div>
      <div class="horizon-rings"></div>
      <div class="motes" id="motes"></div>
      <canvas id="world-canvas"></canvas>
      <div class="hud"><div class="hud-chip"><span class="dot"></span>Sector A · Observatory feed</div></div>
      <div class="legend">
        <div class="legend-item"><span class="legend-swatch" style="background:var(--teal)"></span>Bond</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--amber)"></span>Trade</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--lilac)"></span>Speech</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--rose)"></span>Conflict</div>
      </div>
      <div class="hud-coords" id="hud-coords">Tracking · stable<br>Coord [ 0.00 , 0.00 ]</div>
    </section>

    <aside class="panel right">
      <div class="panel-head"><div class="panel-title">Inhabitants</div><div class="panel-sub">Roster</div></div>
      <div id="roster-container"><div class="empty">No entities present.</div></div>
    </aside>
  </main>

<script>
/**
 * OBSERVATORY — Frontend only. 
 * Action Interpretation Layer + Boundary Collision Tooltips (Fixed 60fps Randomization Glitch).
 */

const WS_URL = 'wss://hon-settle-booking-childhood.trycloudflare.com/ws';
const MAP_SIZE = 60;
const MAX_FEED = 50;
const LERP_SPEED = 0.04; 

const state = { 
  tick: 0, 
  agents: new Map(), 
  metrics: { conflicts: 0 }, 
  hoveredAgent: null,
  recentEventHashes: [] 
};

/* ── Motes ── */
(function spawnMotes(){
  const root = document.getElementById('motes');
  for (let i = 0; i < 28; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const x = Math.random()*100, y = Math.random()*100;
    const dx = (Math.random()-0.5)*120, dy = (Math.random()-0.5)*120;
    const dur = 14 + Math.random()*22;
    m.style.left = x + '%'; m.style.top = y + '%';
    m.style.setProperty('--dx', dx+'px'); m.style.setProperty('--dy', dy+'px');
    m.style.animationDuration = dur+'s'; m.style.animationDelay = (-Math.random()*dur)+'s';
    m.style.opacity = 0.2 + Math.random()*0.4;
    if (Math.random() < 0.25) { m.style.width='3px'; m.style.height='3px'; }
    root.appendChild(m);
  }
})();

/* ── Action Interpretation Layer ── */

const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

function translateAction(actionRaw, targetName, isHtml = false) {
  if (!actionRaw) return 'resting quietly';
  
  let a = actionRaw.toLowerCase();
  let tRaw = targetName && targetName !== 'Unknown' ? targetName : null;
  let t = tRaw ? (isHtml ? `<span class="ev-agent">${tRaw}</span>` : tRaw) : '';

  if (a.includes('fail') || a.includes('cancel')) {
    if (a.includes('observe')) return t ? pick([`lost sight of ${t}`, `could no longer track ${t}`]) : `lost track of their surroundings`;
    if (a.includes('trade')) return t ? `abandoned a trade with ${t}` : `reconsidered a transaction`;
    return pick([`abandoned an attempted action`, `hesitated and stopped`, `paused uncertainly`]);
  }

  if (a.includes('rumor')) {
    return t ? pick([`quietly spread suspicion about ${t}`, `whispered secrets regarding ${t}`]) : `shared hushed rumors`;
  }
  
  if (a.includes('forage')) {
    return pick([`searched the nearby terrain for food`, `scavenged the area for supplies`, `looked for provisions`]);
  }
  
  if (a.includes('observe')) {
    return t ? pick([`watched ${t} carefully`, `kept a close eye on ${t}`]) : `surveyed the surrounding area`;
  }
  
  if (a.includes('wander') || a.includes('move')) {
    return pick([`wandered across the sector`, `patrolled the perimeter`, `relocated to a new position`]);
  }
  
  if (a.includes('trade') || a.includes('give')) {
    return t ? pick([`traded supplies with ${t}`, `exchanged resources with ${t}`]) : pick([`traded with a passerby`, `bartered for supplies`]);
  }
  
  if (a.includes('confront') || a.includes('attack')) {
    return t ? pick([`stepped up to confront ${t}`, `clashed with ${t}`]) : pick([`lashed out defensively`, `instigated a conflict`]);
  }
  
  if (a.includes('flee') || a.includes('escape')) {
    return t ? pick([`retreated quickly from ${t}`, `fled the area to avoid ${t}`]) : `retreated to a safer distance`;
  }
  
  if (a.includes('speak') || a.includes('talk')) {
    return t ? `spoke with ${t}` : `spoke aloud`;
  }
  
  if (a.includes('memory') || a.includes('remember') || a.includes('think')) {
    return pick([`recalled a distant memory`, `paused in quiet reflection`, `reflected on recent events`]);
  }
  
  if (a.includes('sleep') || a.includes('rest')) {
    return `rested to recover energy`;
  }

  return `performed a quiet action`;
}

function getStatusBadge(actionRaw) {
  if (!actionRaw) return { text: 'Resting', class: '' };
  let a = actionRaw.toLowerCase();
  
  if (a.includes('fail')) return { text: 'Hesitating', class: 'status-negative' };
  if (a.includes('trade') || a.includes('give')) return { text: 'Trading', class: 'status-positive' };
  if (a.includes('confront') || a.includes('attack')) return { text: 'Hostile', class: 'status-negative' };
  if (a.includes('forage')) return { text: 'Scavenging', class: '' };
  if (a.includes('wander')) return { text: 'Wandering', class: '' };
  if (a.includes('speak') || a.includes('talk') || a.includes('rumor')) return { text: 'Conversing', class: 'status-social' };
  if (a.includes('observe')) return { text: 'Observing', class: '' };
  if (a.includes('sleep') || a.includes('rest')) return { text: 'Exhausted', class: 'status-negative' };
  
  return { text: 'Active', class: 'status-positive' };
}

/* ── Canvas ── */
const canvas = document.getElementById('world-canvas');
const ctx = canvas.getContext('2d');
let cw, ch, dpr;

function resize() {
  const wrap = document.getElementById('map-wrapper');
  cw = wrap.clientWidth; ch = wrap.clientHeight;
  dpr = window.devicePixelRatio || 1;
  canvas.width = cw * dpr; canvas.height = ch * dpr;
  canvas.style.width = cw+'px'; canvas.style.height = ch+'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const x = (mx / cw) * MAP_SIZE, y = (my / ch) * MAP_SIZE;
  document.getElementById('hud-coords').innerHTML = `Tracking · stable<br>Coord [ ${x.toFixed(2)} , ${y.toFixed(2)} ]`;

  state.hoveredAgent = null;
  state.agents.forEach(a => {
    const sx = (a.renderX / MAP_SIZE) * cw, sy = (a.renderY / MAP_SIZE) * ch;
    if (Math.hypot(mx - sx, my - sy) < 18) state.hoveredAgent = a.id;
  });
});

function actionTone(agent) {
  const act = (agent.last_action || '').toLowerCase();
  if (act.includes('fail'))                               return '#aab3bd';
  if (act.includes('confront') || act.includes('attack')) return '#c9667a';
  if (act.includes('trade') || act.includes('give'))      return '#c9a06b';
  if (act.includes('speak') || act.includes('rumor'))     return '#9b8cc4';
  if (act.includes('memory') || act.includes('think'))    return '#7aa5c9';
  return '#6fb3a8';
}

function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function draw() {
  ctx.clearRect(0, 0, cw, ch);
  const timePulse = Math.sin(Date.now() / 800) * 0.15;

  ctx.globalCompositeOperation = 'lighter';
  state.agents.forEach(agent => {
    if (!agent.top_relationships) return;
    const p1 = { x: (agent.renderX / MAP_SIZE) * cw, y: (agent.renderY / MAP_SIZE) * ch };
    agent.top_relationships.forEach(rel => {
      if (Math.abs(rel.bond) < 0.2) return;
      const target = state.agents.get(rel.id);
      if (!target) return;
      const p2 = { x: (target.renderX / MAP_SIZE) * cw, y: (target.renderY / MAP_SIZE) * ch };

      const grad = ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
      const col = rel.bond > 0 ? '#6fb3a8' : '#c9667a';
      let baseAlpha = Math.min(0.35, Math.abs(rel.bond) * 0.5);
      let animatedAlpha = Math.max(0.05, baseAlpha + (rel.bond > 0 ? timePulse : -timePulse));

      grad.addColorStop(0, hexA(col, animatedAlpha));
      grad.addColorStop(0.5, hexA(col, animatedAlpha * 0.55));
      grad.addColorStop(1, hexA(col, animatedAlpha));

      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = grad; ctx.lineWidth = rel.bond > 0 ? 1 : 0.8;
      if (rel.bond < 0) { ctx.setLineDash([3, 7]); ctx.lineDashOffset = -(Date.now() / 120) % 10; }
      ctx.stroke(); ctx.setLineDash([]);
    });
  });
  ctx.globalCompositeOperation = 'source-over';

  state.agents.forEach(agent => {
    agent.renderX += (agent.targetX - agent.renderX) * LERP_SPEED;
    agent.renderY += (agent.targetY - agent.renderY) * LERP_SPEED;

    if (Math.hypot(agent.targetX - agent.renderX, agent.targetY - agent.renderY) > 0.08) {
      agent.trail.push({ x: agent.renderX, y: agent.renderY });
      if (agent.trail.length > 26) agent.trail.shift();
    }

    const pos = { x: (agent.renderX / MAP_SIZE) * cw, y: (agent.renderY / MAP_SIZE) * ch };
    const tone = actionTone(agent);
    const hovered = state.hoveredAgent === agent.id;

    if (agent.trail.length > 1) {
      for (let i = 1; i < agent.trail.length; i++) {
        const a = agent.trail[i-1], b = agent.trail[i];
        const t = i / agent.trail.length;
        ctx.beginPath();
        ctx.moveTo((a.x/MAP_SIZE)*cw, (a.y/MAP_SIZE)*ch); ctx.lineTo((b.x/MAP_SIZE)*cw, (b.y/MAP_SIZE)*ch);
        ctx.strokeStyle = hexA(tone, 0.04 + t*0.18); ctx.lineWidth = 1.2; ctx.stroke();
      }
    }

    const auraR = hovered ? 46 : 34;
    const aura = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, auraR);
    aura.addColorStop(0, hexA(tone, 0.22)); aura.addColorStop(0.55, hexA(tone, 0.06)); aura.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(pos.x, pos.y, auraR, 0, Math.PI*2); ctx.fill();

    if (agent.pingRadius < 48) {
      ctx.beginPath(); ctx.arc(pos.x, pos.y, agent.pingRadius, 0, Math.PI * 2);
      ctx.strokeStyle = hexA(tone, Math.max(0, 0.45 - agent.pingRadius/48 * 0.45));
      ctx.lineWidth = 1.5; ctx.stroke();
      agent.pingRadius += 0.4;
    }

    ctx.beginPath(); ctx.arc(pos.x, pos.y, hovered ? 9 : 7, 0, Math.PI*2);
    ctx.strokeStyle = hexA(tone, 0.55); ctx.lineWidth = 1; ctx.stroke();

    ctx.shadowBlur = hovered ? 14 : 8; ctx.shadowColor = hexA(tone, 0.7);
    ctx.fillStyle = '#f1f4f6'; ctx.beginPath(); ctx.arc(pos.x, pos.y, hovered ? 3.6 : 2.6, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

    if (hovered) {
      const label = (agent.name || 'Unknown');
      
      // FIX: Read from the cached string instead of running translateAction() randomly 60x a second.
      const actionText = agent._displayAction || ''; 
      
      ctx.font = '500 12px Inter, sans-serif';
      const nameW = ctx.measureText(label).width;
      
      ctx.font = '400 11px JetBrains Mono, monospace';
      const actionW = actionText ? ctx.measureText(actionText).width : 0;
      
      const boxW = Math.max(nameW, actionW) + 20;
      const boxH = actionText ? 42 : 24;
      
      let lx = pos.x + 14;
      let ly = pos.y - 22;
      
      if (lx + boxW > cw - 10) lx = pos.x - boxW - 14; 
      if (ly < 10) ly = pos.y + 14;
      if (ly + boxH > ch - 10) ly = ch - boxH - 10;

      ctx.fillStyle = 'rgba(15,19,24,0.85)'; 
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; 
      ctx.lineWidth = 1;
      roundRect(ctx, lx, ly, boxW, boxH, 6); 
      ctx.fill(); ctx.stroke();
      
      ctx.fillStyle = '#e8ebef'; 
      ctx.font = '500 12px Inter, sans-serif';
      ctx.fillText(label, lx + 10, ly + 16);

      if (actionText) {
        ctx.font = '400 11px JetBrains Mono, monospace'; 
        ctx.fillStyle = hexA(tone, 0.9);
        ctx.fillText(actionText, lx + 10, ly + 32);
      }
    }
  });

  requestAnimationFrame(draw);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}

/* ── Ingestion ── */
function processSnapshot(data) {
  if (!data) return;

  if (data.tick) {
    state.tick = data.tick; document.getElementById('val-tick').innerText = String(state.tick).padStart(5,'0');
  }

  if (data.agents) {
    document.getElementById('val-agents').innerText = data.agents.length;
    data.agents.forEach(incoming => {
      let agent = state.agents.get(incoming.id);
      
      if (!agent) {
        agent = { ...incoming, renderX: incoming.x, renderY: incoming.y, targetX: incoming.x, targetY: incoming.y, trail: [], pingRadius: 100 };
        // FIX: Cache the narrative text exactly once upon agent creation
        agent._displayAction = translateAction(agent.last_action, agent.target, false).replace(/<[^>]+>/g, '');
        state.agents.set(incoming.id, agent);
      } else {
        const oldAction = agent.last_action;
        const oldTarget = agent.target;
        Object.assign(agent, incoming);
        agent.targetX = incoming.x; agent.targetY = incoming.y;
        
        // FIX: Update the Roster/Hover text ONLY when the action or target actually changes
        if (incoming.last_action !== oldAction || incoming.target !== oldTarget) {
          agent._displayAction = translateAction(agent.last_action, agent.target, false).replace(/<[^>]+>/g, '');
          
          if (incoming.last_action !== oldAction) { 
            agent.pingRadius = 4; agent._pulseId = incoming.id; 

            // --- NEW: Force EVERY action change into the live feed ---
            const syntheticEvent = {
              tick: state.tick,
              agent: incoming.name,
              action: incoming.last_action,
              target: incoming.target,
              phrase: incoming.phrase
            };
            
            const sig = `${syntheticEvent.agent}-${syntheticEvent.action}-${syntheticEvent.target}-${syntheticEvent.phrase}`;
            if (!state.recentEventHashes.includes(sig)) {
              state.recentEventHashes.push(sig);
              if (state.recentEventHashes.length > 50) state.recentEventHashes.shift();
              createFeedEvent(syntheticEvent);
            }
            // ---------------------------------------------------------
          }
        }
      }
    });
    renderRoster();
  }

  if (data.events) {
    // FIX: show events from last 10 ticks, not just current tick
    const tenTicksAgo = (state.tick || 0) - 10;
    const fresh = data.events.filter(e => e.tick > tenTicksAgo && e.tick <= (state.tick || 9999));
    fresh.forEach(e => {
      const sig = `${e.agent}-${e.action}-${e.target}-${e.phrase}`;
      if (state.recentEventHashes.includes(sig)) return;
      state.recentEventHashes.push(sig);
      if (state.recentEventHashes.length > 30) state.recentEventHashes.shift();

      createFeedEvent(e);
    });
    // FIX: read conflicts from persistent backend metric, not local counter
    const backendConflicts = (data.metrics && data.metrics.action_confront) || 0;
    document.getElementById('val-conflicts').innerText = backendConflicts;
  }
}

function createFeedEvent(e) {
  const t = (e.type || e.action || '').toLowerCase();

  const feed = document.getElementById('feed-container');
  const empty = feed.querySelector('.empty');
  if (empty) empty.remove();

  const card = document.createElement('div');
  
  const agentName = (e.agent && e.agent !== 'Unknown') ? e.agent : 'An inhabitant';
  const targetName = (e.target && e.target !== 'Unknown') ? e.target : null;
  const agentHtml = `<span class="ev-agent">${agentName}</span>`;
  
  let typeClass = 'event-move';
  let tag = 'Event';
  let body = '';

  const narrativeAction = translateAction(t, targetName, true);

  if (t.includes('speak') || t.includes('speech') || e.phrase) {
    typeClass = 'event-speech'; tag = 'Speech';
    let verb = 'spoke to';
    if (e.phrase && e.phrase.includes('!')) verb = 'warned';
    else if (e.phrase && e.phrase.includes('?')) verb = 'asked';

    let targetHtml = targetName ? `<span class="ev-agent">${targetName}</span>` : 'another';
    body = `${agentHtml} ${verb} ${targetHtml}.`;
    if (e.phrase) body += `<span class="ev-quote">“${e.phrase}”</span>`;
  } 
  else if (t.includes('confront') || t.includes('attack')) {
    typeClass = 'event-conflict'; tag = 'Conflict';
    body = `${agentHtml} ${narrativeAction}.`;
  } 
  else if (t.includes('trade') || t.includes('give')) {
    typeClass = 'event-trade'; tag = 'Trade';
    body = `${agentHtml} ${narrativeAction}.`;
  } 
  else if (t.includes('memory') || t.includes('think') || t.includes('remember')) {
    typeClass = 'event-memory'; tag = 'Memory';
    body = `${agentHtml} ${narrativeAction}.`;
    if (e.phrase) body += `<span class="ev-quote">“${e.phrase}”</span>`;
  } 
  else {
    tag = 'Action';
    body = `${agentHtml} ${narrativeAction}.`;
  }

  card.className = `event-card ${typeClass}`;
  card.innerHTML = `<div class="ev-meta"><span>T·${String(state.tick).padStart(5,'0')}</span><span class="ev-tag">${tag}</span></div><div class="ev-body">${body}</div>`;
  
  feed.prepend(card);
  while (feed.children.length > MAX_FEED) feed.removeChild(feed.lastChild);
}

function renderRoster() {
  const container = document.getElementById('roster-container');
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const sorted = Array.from(state.agents.values()).sort((a,b) => (a.name||'').localeCompare(b.name||''));
  container.innerHTML = '';
  
  sorted.forEach(a => {
    const badge = getStatusBadge(a.last_action);
    
    // FIX: Match the map tooltip exactly using the cached string
    const narrativeAction = a._displayAction || 'resting quietly';
    
    const nrg = a.needs && a.needs.energy != null ? Math.round(a.needs.energy * 100) : 100;
    const sus = a.needs && a.needs.hunger != null ? Math.round((1 - a.needs.hunger) * 100) : 100;
    const tone = actionTone(a);

    const div = document.createElement('div');
    div.className = 'entity-card';
    if (a._pulseId === a.id) { div.classList.add('active-pulse'); a._pulseId = null; }
    div.onmouseenter = () => state.hoveredAgent = a.id;
    div.onmouseleave = () => state.hoveredAgent = null;

    div.innerHTML = `
      <div class="ent-head">
        <div class="ent-id">
          <span class="ent-glyph" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6), transparent 50%), ${tone}; box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 14px ${hexA(tone,0.28)};"></span>
          <span class="ent-name">${a.name || 'Unknown'}</span>
        </div>
        <span class="ent-status-badge ${badge.class}">${badge.text}</span>
      </div>
      <div class="ent-action">
        <span class="lead">Now</span>
        <span>${narrativeAction}.</span>
      </div>
      <div class="ent-stats">
        <div class="stat-row"><span class="label">Nrg</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,nrg))}%"></div></div><span class="val">${nrg}%</span></div>
        <div class="stat-row"><span class="label">Sus</span><div class="bar-bg"><div class="bar-fill fill-sus" style="width:${Math.max(0,Math.min(100,sus))}%"></div></div><span class="val">${sus}%</span></div>
      </div>
    `;
    container.appendChild(div);
  });

  if (sorted.length === 0) container.innerHTML = '<div class="empty">No entities present.</div>';
}

function connect() {
  const status = document.getElementById('conn-status'), label = document.getElementById('conn-label');
  label.innerText = 'Connecting'; status.classList.remove('offline');
  let ws;
  try { ws = new WebSocket(WS_URL); } catch (err) {
    status.classList.add('offline'); label.innerText = 'Offline'; setTimeout(connect, 3000); return;
  }
  ws.onopen = () => {
    status.classList.remove('offline'); label.innerText = 'Live';
    // FIX: clear dedup hashes on reconnect so history events aren't skipped
    state.recentEventHashes = [];
  };
  ws.onmessage = (e) => { try { processSnapshot(JSON.parse(e.data)); } catch (err) { console.warn('Stream parse error', err); } };
  ws.onclose = () => { status.classList.add('offline'); label.innerText = 'Reconnecting'; setTimeout(connect, 3000); };
  ws.onerror = () => { try { ws.close(); } catch {} };
}

requestAnimationFrame(draw); connect();
</script>
</body>
</html>
